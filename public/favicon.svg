<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C19A1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" fill="#1a1a1a"/>
  <!-- Gold border circle -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <!-- Inner circle -->
  <circle cx="90" cy="90" r="75" fill="#0a0a0a"/>
  <!-- "TE" text in gold -->
  <text x="90" y="110" font-family="serif" font-size="72" font-weight="bold" fill="#D4AF37" text-anchor="middle" font-style="italic">TE</text>
  <!-- Small accent line -->
  <line x1="50" y1="65" x2="130" y2="65" stroke="#D4AF37" stroke-width="2"/>
  <line x1="50" y1="135" x2="130" y2="135" stroke="#D4AF37" stroke-width="2"/>
</svg>
